<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password | AgriLink Marketplace</title>
  <meta name="robots" content="noindex">

  <!-- Reuses the main site's stylesheet so .auth-card / .auth-alert / .btn-primary / .spinner all match -->
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Set theme before first paint, same as index.html -->
  <script>
    (function () {
      var saved = localStorage.getItem('theme');
      var theme = saved || (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>

  <style>
    /* Page-level layout only — everything else (.auth-card, .auth-alert,
       .btn, .spinner, .form-group, etc.) comes from styles.css so this
       page looks identical to the sign-in / register pages. */
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .reset-wrap {
      width: 100%;
      max-width: 440px;
    }
    .reset-back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.9rem;
      color: var(--text-muted);
      text-decoration: none;
      margin-bottom: 18px;
    }
    .reset-back-link:hover { color: var(--primary); }
    .reset-state {
      text-align: center;
      padding: 12px 4px 4px;
    }
    .reset-state svg {
      width: 40px;
      height: 40px;
      margin-bottom: 12px;
    }
    .reset-state.checking svg { color: var(--text-muted); animation: reset-spin 1s linear infinite; }
    .reset-state.invalid svg { color: #e0554f; }
    @keyframes reset-spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div class="reset-wrap">
    <a href="index.html#/" class="reset-back-link">&larr; Back to AgriLink</a>

    <div class="auth-card" id="reset-card">

      <!-- Step 0: verifying the recovery link from the email -->
      <div id="reset-checking" class="reset-state checking">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" d="M12 3a9 9 0 1 0 9 9"/>
        </svg>
        <h2>Verifying your link&hellip;</h2>
        <p style="color:var(--text-muted); font-size:0.9rem;">Please wait a moment.</p>
      </div>

      <!-- Step 1: link was bad / expired -->
      <div id="reset-invalid" class="reset-state invalid" style="display:none;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="9"/>
          <path stroke-linecap="round" d="M12 8v5M12 16h.01"/>
        </svg>
        <h2>Link expired or invalid</h2>
        <p style="color:var(--text-muted); font-size:0.9rem; margin-bottom:20px;">
          This password reset link is no longer valid. Please request a new one.
        </p>
        <a href="index.html#/farmer-forgot-password" class="btn btn-primary" style="width:100%; text-align:center; display:block;">
          Request a new link
        </a>
      </div>

      <!-- Step 2: set the new password -->
      <div id="reset-form-wrap" style="display:none;">
        <h2 style="margin-bottom:6px;">Set a new password</h2>
        <p style="color:var(--text-muted); font-size:0.9rem; margin-bottom:20px;">
          Choose a new password for your account.
        </p>

        <form id="set-password-form">
          <div class="form-group">
            <label for="new-password">New password</label>
            <input type="password" id="new-password" name="new-password" required minlength="6" placeholder="At least 6 characters">
          </div>
          <div class="form-group">
            <label for="confirm-new-password">Confirm new password</label>
            <input type="password" id="confirm-new-password" name="confirm-new-password" required minlength="6" placeholder="Re-enter your new password">
          </div>
          <button type="submit" class="btn btn-primary" style="width:100%; margin-top:8px;">
            Update password
          </button>
        </form>
      </div>

      <!-- Step 3: success -->
      <div id="reset-success" class="reset-state" style="display:none;">
        <svg viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z" fill="var(--primary)" stroke="none"/>
        </svg>
        <h2>Password updated</h2>
        <p style="color:var(--text-muted); font-size:0.9rem;">Redirecting you to sign in&hellip;</p>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      // ==== Keep these in sync with app.js ====
      const SUPABASE_URL = "https://ofbwcyncwuqevbmlmafa.supabase.co";
      const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9mYndjeW5jd3VxZXZibWxtYWZhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM4Mjc3OTAsImV4cCI6MjA5OTQwMzc5MH0.MKKH3du-vv9X2n4as1VahfGyUgNc1Nlks60sDoWlGTc";

      const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
        auth: { detectSessionInUrl: false } // we handle the exchange manually below
      });

      const checkingBox = document.getElementById('reset-checking');
      const invalidBox = document.getElementById('reset-invalid');
      const formBox = document.getElementById('reset-form-wrap');
      const successBox = document.getElementById('reset-success');
      const form = document.getElementById('set-password-form');

      function showOnly(el) {
        [checkingBox, invalidBox, formBox, successBox].forEach(box => {
          box.style.display = (box === el) ? '' : 'none';
        });
      }

      function showFormAlert(text, type = 'error') {
        let alertDiv = formBox.querySelector('.auth-alert');
        if (!alertDiv) {
          alertDiv = document.createElement('div');
          alertDiv.className = 'auth-alert';
          formBox.insertBefore(alertDiv, formBox.firstChild.nextSibling);
        }
        alertDiv.className = `auth-alert alert-${type}`;
        alertDiv.textContent = text;
      }

      // Supabase's PKCE recovery redirect appends ?code=xxxx to this page's URL.
      // Some Supabase configurations may instead put a token in the hash
      // (#access_token=...&type=recovery) — handled as a fallback below.
      const searchParams = new URLSearchParams(window.location.search);
      const code = searchParams.get('code');

      async function exchangeViaCode(authCode) {
        const { error } = await supabaseClient.auth.exchangeCodeForSession(authCode);
        return !error;
      }

      async function exchangeViaHash() {
        const hash = window.location.hash.startsWith('#') ? window.location.hash.slice(1) : window.location.hash;
        const hashParams = new URLSearchParams(hash);
        const accessToken = hashParams.get('access_token');
        const refreshToken = hashParams.get('refresh_token');
        const type = hashParams.get('type');
        if (!accessToken || type !== 'recovery') return false;

        const { error } = await supabaseClient.auth.setSession({
          access_token: accessToken,
          refresh_token: refreshToken
        });
        return !error;
      }

      (async () => {
        let ok = false;

        if (code) {
          ok = await exchangeViaCode(code);
        } else {
          ok = await exchangeViaHash();
        }

        // Clean the sensitive token out of the visible URL either way
        window.history.replaceState({}, document.title, window.location.pathname);

        if (ok) {
          showOnly(formBox);
        } else {
          showOnly(invalidBox);
        }
      })();

      form.addEventListener('submit', async (e) => {
        e.preventDefault();

        const newPassword = document.getElementById('new-password').value;
        const confirmPassword = document.getElementById('confirm-new-password').value;
        const submitBtn = form.querySelector('button[type="submit"]');
        const originalBtnText = submitBtn.textContent;

        if (newPassword.length < 6) {
          showFormAlert('Password must be at least 6 characters long.', 'error');
          return;
        }
        if (newPassword !== confirmPassword) {
          showFormAlert('Passwords do not match. Please re-check.', 'error');
          return;
        }

        try {
          submitBtn.disabled = true;
          submitBtn.innerHTML = `<span class="spinner"></span> Updating...`;

          const { error } = await supabaseClient.auth.updateUser({ password: newPassword });
          if (error) throw error;

          // Drop the temporary recovery session so the user signs in fresh.
          await supabaseClient.auth.signOut();

          showOnly(successBox);
          setTimeout(() => {
            window.location.href = 'index.html#/farmer-signin';
          }, 1800);

        } catch (err) {
          console.error('Password update error:', err.message);
          showFormAlert(err.message || 'Could not update password. Please try again.', 'error');
        } finally {
          submitBtn.disabled = false;
          submitBtn.textContent = originalBtnText;
        }
      });
    });
  </script>

</body>
</html>
